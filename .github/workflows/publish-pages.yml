name: Publish hosted remote

on:
  push:
    branches:
      - main
      - master
      - work
    paths:
      - 'repo/**'
      - 'scripts/generate-flatpakrepo.sh'
      - '.github/workflows/publish-pages.yml'
      - 'README.md'
      - 'site/index.html'
  workflow_dispatch:

env:
  FLATPAK_REMOTE_BASE_URL: https://mgl-xyz.github.io/flathub
  FLATPAK_REMOTE_NAME: flathub
  FLATPAK_REMOTE_TITLE: mgl-xyz Flathub Remote

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Pages payload
        run: |
          rm -rf public
          mkdir -p public
          cp -R repo public/repo
          cp site/index.html public/index.html
          ./scripts/generate-flatpakrepo.sh

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
